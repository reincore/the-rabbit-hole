<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20" y="-20" width="140" height="140" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <circle cx="50" cy="50" r="49" fill="#050508"/>

  <!-- 2 bold rings + center core -->
  <ellipse cx="50" cy="50" rx="42" ry="19" fill="none" stroke="#00f5d4" stroke-width="4.5" opacity="0.7" filter="url(#glow)"/>
  <ellipse cx="50" cy="50" rx="22" ry="10" fill="none" stroke="#9d4edd" stroke-width="4.5" opacity="0.9"/>
  
  <!-- Glowing center core -->
  <ellipse cx="50" cy="50" rx="7"  ry="3.5" fill="#00f5d4" opacity="1" filter="url(#glow)"/>
</svg>
